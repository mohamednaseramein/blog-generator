name: Deploy to EC2

on:
  push:
    branches: [main]

concurrency:
  group: deploy-ec2-development
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    environment:
      name: development
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.3
        env:
          GITHUB_REPO: ${{ github.repository }}
          GIT_CLONE_TOKEN: ${{ secrets.GIT_CLONE_TOKEN }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}
          SUPABASE_DB_URL: ${{ vars.SUPABASE_DB_URL }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          envs: GITHUB_REPO,GIT_CLONE_TOKEN,SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_DB_URL,VITE_BASE_URL,ANTHROPIC_MODEL,SUPABASE_SERVICE_ROLE_KEY,ANTHROPIC_API_KEY,JWT_SECRET
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            _home="${HOME:-}"
            if [ -z "${_home}" ] && command -v getent >/dev/null 2>&1; then
              _home="$(getent passwd "$(id -un)" 2>/dev/null | cut -d: -f6)" || true
            fi
            if [ -z "${_home}" ]; then
              _home="/home/$(id -un)"
            fi
            export HOME="${_home}"
            if [ -z "${DEPLOY_PATH}" ]; then
              DEPLOY_PATH="${_home}/blog-generator"
            fi
            case "${DEPLOY_PATH}" in
              '~') DEPLOY_PATH="${_home}" ;;
              ~/*) DEPLOY_PATH="${_home}/${DEPLOY_PATH#~/}" ;;
            esac
            echo "[deploy] Resolved deploy directory (HOME=${_home})"
            if [ ! -d "${DEPLOY_PATH}" ]; then
              echo "[deploy] Path missing; cloning github.com/${GITHUB_REPO} -> ${DEPLOY_PATH}"
              _parent="$(dirname "${DEPLOY_PATH}")"
              mkdir -p "${_parent}"
              if [ -n "${GIT_CLONE_TOKEN:-}" ]; then
                _url="https://x-access-token:${GIT_CLONE_TOKEN}@github.com/${GITHUB_REPO}.git"
              else
                _url="https://github.com/${GITHUB_REPO}.git"
              fi
              if ! git clone "${_url}" "${DEPLOY_PATH}"; then
                echo "[deploy] ERROR: git clone failed. For a private repo add Actions secret GIT_CLONE_TOKEN (fine-scoped PAT: Contents read)." >&2
                exit 1
              fi
            fi
            cd "${DEPLOY_PATH}"
            if [ -n "${GIT_CLONE_TOKEN:-}" ]; then
              git remote set-url origin "https://x-access-token:${GIT_CLONE_TOKEN}@github.com/${GITHUB_REPO}.git"
            fi
            echo "[deploy] Syncing git to origin/main"
            git fetch origin main
            git checkout -B main origin/main
            echo "[deploy] HEAD=$(git rev-parse --short HEAD) branch=$(git branch --show-current)"
            
            echo "[deploy] Writing backend/.env from GitHub Actions Environment (development)"
            umask 077
            mkdir -p backend
            _frontend_url="${VITE_BASE_URL:-}"
            {
              printf 'SUPABASE_URL=%s\n' "${SUPABASE_URL:-}"
              printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "${SUPABASE_SERVICE_ROLE_KEY:-}"
              printf 'SUPABASE_ANON_KEY=%s\n' "${SUPABASE_ANON_KEY:-}"
              printf 'SUPABASE_DB_URL=%s\n' "${SUPABASE_DB_URL:-}"
              printf '\n'
              printf 'PORT=3000\n'
              printf 'NODE_ENV=production\n'
              printf 'FRONTEND_URL=%s\n' "${_frontend_url:-}"
              printf '\n'
              printf 'ANTHROPIC_API_KEY=%s\n' "${ANTHROPIC_API_KEY:-}"
              printf 'ANTHROPIC_MODEL=%s\n' "${ANTHROPIC_MODEL:-}"
              printf '\n'
              printf 'JWT_SECRET=%s\n' "${JWT_SECRET:-}"
              printf '\n'
              printf 'VITE_BASE_URL=%s\n' "${VITE_BASE_URL:-}"
            } > backend/.env
            chmod 600 backend/.env || true

            if [ -x scripts/deploy-ec2.sh ]; then
              echo "[deploy] Starting deployment script..."
              scripts/deploy-ec2.sh .
            else
              echo "[deploy] ERROR: scripts/deploy-ec2.sh missing or not executable" >&2
              exit 1
            fi