# Usage: . scripts/build-env.sh && docker compose --env-file backend/.env up --build
# --env-file is required for compose-level ${VAR} (Supabase + optional APP_VERSION / GIT_SHA).
# APP_VERSION / GIT_SHA label images and are optional for GET /version git metadata.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-}
    env_file: backend/.env
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
        VITE_BASE_URL: ${VITE_BASE_URL:-}
        # Prefer dedicated Vite-prefixed vars (pipeline), fallback to SUPABASE_* (legacy).
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-${SUPABASE_URL}}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-${SUPABASE_ANON_KEY}}
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-}
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
